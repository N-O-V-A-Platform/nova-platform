services:
  db:
    image: postgres:15-alpine
    container_name: nova_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: nova_db
      POSTGRES_USER: nova_user
      POSTGRES_PASSWORD: nova_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nova_user -d nova_db"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - nova_network

  redis:
    image: redis:7-alpine
    container_name: nova_redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - nova_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: nova_backend
    restart: unless-stopped

    env_file:
      - ./backend/.env.docker

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - nova_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: nova_frontend
    restart: unless-stopped

    ports:
      - "3000:3000"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    networks:
      - nova_network

volumes:
  postgres_data:

networks:
  nova_network:
    driver: bridge